name: Full DevOps Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Terraform Init
      run: terraform -chdir=terraform init

    - name: Terraform Apply
      run: terraform -chdir=terraform apply -auto-approve

    - name: Get Master IP
      run: |
        echo "MASTER_IP=$(terraform -chdir=terraform output -raw master_public_ip)" >> $GITHUB_ENV

    # 🔥 SSH KEY SETUP
    - name: Setup SSH Key
      run: |
        echo "${{ secrets.EC2_KEY }}" | sed 's/\\n/\n/g' > key.pem
        chmod 400 key.pem

    - name: Debug Key
      run: |
        head -n 5 key.pem
        wc -l key.pem

    # 🔥 WAIT FOR EC2
    - name: Wait for SSH
      run: |
        until ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$MASTER_IP "echo ready"; do
          echo "Waiting for EC2..."
          sleep 10
        done

    # 🔥 WAIT EXTRA
    - name: Wait for Instance Stabilization
      run: sleep 120

    # 🔥 RUN BOOTSTRAP
    - name: Run Bootstrap
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "bash -s" < scripts/bootstrap.sh

    # 🔥 CHECK CLUSTER
    - name: Verify Kubernetes Cluster
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl get nodes"

    # 🔥 APPLY ARGOCD APP
    - name: Apply ArgoCD App
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl apply -f ~/devops-ecommerce-kubeadm/argocd/app.yaml"

    # 🔥 WAIT FOR ARGOCD APP OBJECT
    - name: Wait for ArgoCD Application
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP '
          until kubectl get application ecommerce-app -n argocd; do
            echo "Waiting for ArgoCD Application..."
            sleep 10
          done
        '

    # 🔥 SHOW APP STATUS
    - name: Check ArgoCD App Status
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl get application -n argocd"

    # 🔥 WAIT FOR ECOMMERCE NAMESPACE
    - name: Wait for Ecommerce Namespace
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP '
          until kubectl get ns ecommerce; do
            echo "Waiting for ecommerce namespace..."
            sleep 10
          done
        '

    # 🔥 CHECK ECOMMERCE PODS
    - name: Check Ecommerce Pods
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl get pods -n ecommerce || true"

    # 🔥 DESCRIBE APP IF FAILED
    - name: Debug ArgoCD App
      if: always()
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl describe application ecommerce-app -n argocd || true
          echo '---'
          kubectl get all -n ecommerce || true
          echo '---'
          kubectl get events -n ecommerce --sort-by=.metadata.creationTimestamp || true
        "
