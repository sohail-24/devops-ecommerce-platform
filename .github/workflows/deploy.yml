name: Full DevOps Pipeline

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Terraform Init
      run: terraform -chdir=terraform init

    - name: Terraform Apply
      run: terraform -chdir=terraform apply -auto-approve

    - name: Get Master IP
      run: |
        echo "MASTER_IP=$(terraform -chdir=terraform output -raw master_public_ip)" >> $GITHUB_ENV

    # 🔥 SSH KEY SETUP
    - name: Setup SSH Key
      run: |
        echo "${{ secrets.EC2_KEY }}" | sed 's/\\n/\n/g' > key.pem
        chmod 400 key.pem

    - name: Debug Key
      run: |
        head -n 5 key.pem
        wc -l key.pem

    # 🔥 WAIT FOR EC2 SSH
    - name: Wait for SSH
      run: |
        until ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "echo ready"; do
          echo "Waiting for EC2..."
          sleep 10
        done

    # 🔥 WAIT EXTRA FOR INSTANCE CLOUD-INIT / PACKAGE STABILIZATION
    - name: Wait for Instance Stabilization
      run: sleep 120

    # 🔥 RUN BOOTSTRAP
    - name: Run Bootstrap
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "bash -s" < scripts/bootstrap.sh

    # 🔥 WAIT FOR K8S API TO STABILIZE
    - name: Wait for Kubernetes API
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP '
          until kubectl get nodes >/dev/null 2>&1; do
            echo "Waiting for Kubernetes API..."
            sleep 10
          done
        '

    # 🔥 CHECK CLUSTER
    - name: Verify Kubernetes Cluster
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl get nodes -o wide"

    # 🔥 APPLY ARGOCD APP
    - name: Apply ArgoCD App
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl apply -f ~/devops-ecommerce-kubeadm/argocd/app.yaml"

    # 🔥 WAIT FOR ARGOCD APP OBJECT
    - name: Wait for ArgoCD Application
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP '
          until kubectl get application ecommerce-app -n argocd >/dev/null 2>&1; do
            echo "Waiting for ArgoCD Application..."
            sleep 10
          done
        '

    # 🔥 SHOW APP STATUS
    - name: Check ArgoCD App Status
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "kubectl get application -n argocd"

    # 🔥 WAIT FOR ECOMMERCE NAMESPACE
    - name: Wait for Ecommerce Namespace
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP '
          until kubectl get ns ecommerce >/dev/null 2>&1; do
            echo "Waiting for ecommerce namespace..."
            sleep 10
          done
        '

    # 🔥 SMALL BUFFER FOR ARGOCD RESOURCE CREATION
    - name: Wait for Initial Resource Creation
      run: sleep 30

    # 🔥 CREATE / UPDATE DJANGO SECRET
    - name: Create Django Secret
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl create secret generic django-secret -n ecommerce \
            --from-literal=SECRET_KEY='${{ secrets.DJANGO_SECRET_KEY }}' \
            --from-literal=DATABASE_URL='${{ secrets.DATABASE_URL }}' \
            --from-literal=REDIS_URL='${{ secrets.REDIS_URL }}' \
            --from-literal=AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
            --from-literal=AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
            --from-literal=AWS_STORAGE_BUCKET_NAME='${{ secrets.AWS_STORAGE_BUCKET_NAME }}' \
            --from-literal=AWS_S3_REGION_NAME='${{ secrets.AWS_S3_REGION_NAME }}' \
            --dry-run=client -o yaml | kubectl apply -f -
        "

    # 🔥 WAIT AFTER SECRET APPLY
    - name: Wait After Secret Apply
      run: sleep 20

    # 🔥 RESTART DJANGO TO PICK NEW SECRET
    - name: Restart Django Deployment
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl rollout restart deployment django -n ecommerce || true
        "

    # 🔥 WAIT BEFORE ROLLOUT STATUS
    - name: Wait Before Rollout Check
      run: sleep 20

    # 🔥 WAIT FOR DJANGO ROLLOUT
    - name: Wait for Django Rollout
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl rollout status deployment django -n ecommerce --timeout=300s || true
        "

    # 🔥 CHECK ECOMMERCE PODS
    - name: Check Ecommerce Pods
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl get pods -n ecommerce -o wide || true
          echo '---'
          kubectl get svc -n ecommerce || true
          echo '---'
          kubectl get jobs -n ecommerce || true
        "

    # 🔥 CHECK DJANGO AWS ENV
    - name: Verify Django AWS Env
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl exec -n ecommerce deploy/django -- env | grep AWS || true
        "

    # 🔥 SHOW DJANGO LOGS
    - name: Show Django Logs
      if: always()
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl logs deploy/django -n ecommerce --tail=150 || true
        "

    # 🔥 DESCRIBE APP IF FAILED
    - name: Debug ArgoCD App
      if: always()
      run: |
        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$MASTER_IP "
          kubectl describe application ecommerce-app -n argocd || true
          echo '---'
          kubectl get all -n ecommerce || true
          echo '---'
          kubectl get events -n ecommerce --sort-by=.metadata.creationTimestamp || true
        "
